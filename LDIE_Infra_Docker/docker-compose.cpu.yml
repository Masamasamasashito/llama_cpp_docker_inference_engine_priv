#---------------------------------------------------------------------------
# Global Logging Configuration (Log Rotation)
#---------------------------------------------------------------------------
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

#---------------------------------------------------------------------------
# services
#---------------------------------------------------------------------------
services:

  #---------------------------------------------------------------------------
  # llama.cpp CPU service
  #---------------------------------------------------------------------------
  llama-cpp-cpu:
    image: ${COMMON_LDIE_DOCKER_LLAMA_CPU_IMAGE:-ghcr.io/ggerganov/llama.cpp}:${COMMON_LDIE_DOCKER_LLAMA_CPU_IMAGE_TAG:-latest}
    container_name: llama-cpp-cpu-server
    logging: *default-logging
    ports:
      - "${DOCKER_HOST_BIND_ADDR:-127.0.0.1}:${DOCKER_HOST_PORT_LLAMA:-8082}:${LLAMA_CONTAINER_LISTEN_PORT:-8080}"
    volumes:
      - ./models:/models:ro
      - ./logs:/logs
    environment:
      - LLAMA_ARG_MODEL=/models/${LLAMA_MODEL_FILE}
      - LLAMA_ARG_CTX_SIZE=${LLAMA_CTX_SIZE:-2048}
      - LLAMA_ARG_N_PARALLEL=${LLAMA_N_PARALLEL:-1}
      - TZ=${COMMON_TIMEZONE:-Asia/Tokyo}
    command: >
      ./server
      --model /models/${LLAMA_MODEL_FILE}
      --host 0.0.0.0
      --port ${LLAMA_CONTAINER_LISTEN_PORT:-8080}
      --api-key ${LLAMA_API_KEY:-}
      --ctx-size ${LLAMA_CTX_SIZE:-2048}
      --n-parallel ${LLAMA_N_PARALLEL:-1}
      --log-format text
      --verbose
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${LLAMA_CONTAINER_LISTEN_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
