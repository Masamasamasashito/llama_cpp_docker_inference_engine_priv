#---------------------------------------------------------------------------
# Global Logging Configuration (Log Rotation)
#---------------------------------------------------------------------------
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

#---------------------------------------------------------------------------
# services
#---------------------------------------------------------------------------
services:

  #---------------------------------------------------------------------------
  # llama.cpp GPU service - OpenClaw Multi-Agent Optimized
  #---------------------------------------------------------------------------
  llama-cpp-gpu:
    image: ${COMMON_LDIE_DOCKER_LLAMA_GPU_IMAGE:-ghcr.io/ggml-org/llama.cpp}:${COMMON_LDIE_DOCKER_LLAMA_GPU_IMAGE_TAG:-server-cuda}
    logging: *default-logging
    ports:
      - "${DOCKER_HOST_BIND_ADDR:-127.0.0.1}:${DOCKER_HOST_PORT_LLAMA:-8084}:${LLAMA_CONTAINER_LISTEN_PORT:-8080}"
    volumes:
      - ./models:/models:ro
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - TZ=${COMMON_TIMEZONE:-Asia/Tokyo}
      - LLAMA_ARG_API_KEY=${LLAMA_API_KEY:-}
    command: >
      -m /models/${LLAMA_MODEL_FILE}
      --host 0.0.0.0
      --port ${LLAMA_CONTAINER_LISTEN_PORT:-8080}
      --api-key ${LLAMA_API_KEY:-}
      --n-gpu-layers 99
      --ctx-size ${LLAMA_CTX_SIZE:-16384}
      --threads ${LLAMA_THREADS:-8}
      --parallel ${LLAMA_N_PARALLEL:-1}
      --cont-batching
      --log-verbose
      --mlock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:${LLAMA_CONTAINER_LISTEN_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
